<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>フランス語フレーズ学習 🇫🇷</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        overscroll-behavior: none;
        margin: 0;
        padding: 0;
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const FrenchPhrasesApp = () => {
          const defaultPhrases = [
            { id: 1, french: "Ta question est profondément française.", japanese: "あなたの質問は根底からフランス的だ。 議論の切り出しで、相手の問いが、フランスの歴史や文化の本質を突いていると評価する際に使う、賛辞に近い表現。" },
            { id: 2, french: "à la fois réaliste et provocante.", japanese: "同時に現実的で挑発的だ。 ある意見や分析の持つ性質を評価する際（例：分析が冷静だが波紋を呼ぶ、など）に使う。à la fois A et B（AとBを同時に）の構文は多様に使えます。" },
            { id: 3, french: "toucher à un sujet qui divise les Français.", japanese: "フランス人を二分するテーマに触れる。 そのテーマが国民の意見を真っ二つに割り、感情的になりやすい、難しい問題であることを表現する。" },
            { id: 4, french: "un héritage lourd et une pratique légère.", japanese: "重い遺産と軽い実践。 矛盾した現状を表現する際に使う対照的な表現。「歴史的な重みはあるが、実際の行動は伴っていない」という皮肉的な分析に便利。" },
            { id: 5, french: "catholique par culture.", japanese: "文化によってカトリックだ。 信仰心はないが、歴史、習慣、祭りなどの文化的背景としてカトリックの影響を受けているという状態を説明する、フランス特有の表現。" },
            { id: 6, french: "La religion est une affaire privée.", japanese: "宗教は人民のアヘンだ。 マルクスの有名な引用で、宗教は人々の知的活動を麻痺させ、社会の不平等を忘れさせるための道具である、という批判的な立場を表明する。" },
            { id: 7, french: "préférer la raison à la foi.", japanese: "信仰よりも理性を好む。 デカルト的な合理主義の立場を明確にする表現。宗教的な教義よりも、科学や論理に基づいた思考を重んじるというニュアンス。" },
            { id: 8, french: "une résistance contre une société trop individualiste.", japanese: "あまりに個人主義的な社会に対する抵抗。 宗教の社会的役割を肯定的に捉える視点。コミュニティや連帯感を生み出す側面を説明する際に使える。" },
            { id: 9, french: "C'est compliqué, et c'est normal.", japanese: "複雑だ、そしてそれが普通なのだ。 議論や分析の最後に、フランス社会が抱える多面的な現実を認め、単純な答えがないことを簡潔に締めくくる際のまとめのフレーズ。" },
            { id: 10, french: "une société laïque obsédée par la religion.", japanese: "時事問題を支配している。 ある特定のテーマが、現在ニュースや議論の中心となっており、他の問題を覆い隠している状態を説明する際に用いる。" },
            { id: 11, french: "La laïcité est une religion à elle seule.", japanese: "ライシテそれ自体が、一つの宗教だ。 ライシテの原則が、あまりにも厳格で、批判を許さない**ドグマ（教義）**のようになっているという、さらに一歩踏み込んだ皮肉を込めた表現。" }
          ];

          const [mode, setMode] = useState('listening');
          const [phrases, setPhrases] = useState(() => {
            const saved = localStorage.getItem('french-phrases-v3');
            return saved ? JSON.parse(saved) : defaultPhrases;
          });
          
          const [isPlaying, setIsPlaying] = useState(false);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [repeatCount, setRepeatCount] = useState(3);
          const [maxPhrases, setMaxPhrases] = useState(10);
          const [isSpeaking, setIsSpeaking] = useState(false);
          const playingRef = useRef(false);
          
          const [newFrench, setNewFrench] = useState('');
          const [newJapanese, setNewJapanese] = useState('');
          const [showAddForm, setShowAddForm] = useState(false);
          
          const [selectedFrench, setSelectedFrench] = useState(null);
          const [selectedJapanese, setSelectedJapanese] = useState(null);
          const [matchedPairs, setMatchedPairs] = useState([]);
          const [shuffledFrench, setShuffledFrench] = useState([]);
          const [shuffledJapanese, setShuffledJapanese] = useState([]);
          const [availableVoices, setAvailableVoices] = useState([]);
          const [selectedVoice, setSelectedVoice] = useState(null);
          const [voiceWarning, setVoiceWarning] = useState('');

          useEffect(() => {
            localStorage.setItem('french-phrases-v3', JSON.stringify(phrases));
          }, [phrases]);

          useEffect(() => {
            const loadVoices = () => {
              const voices = window.speechSynthesis.getVoices();
              const frenchVoices = voices.filter(voice => voice.lang.startsWith('fr'));
              setAvailableVoices(frenchVoices);
              
              if (frenchVoices.length > 0) {
                const preferredVoice = 
                  frenchVoices.find(v => v.name.includes('Thomas')) ||
                  frenchVoices.find(v => v.name.includes('Amélie')) ||
                  frenchVoices[0];
                setSelectedVoice(preferredVoice);
                setVoiceWarning('');
              } else {
                setVoiceWarning('⚠️ フランス語音声が見つかりません。');
              }
            };

            loadVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
              window.speechSynthesis.onvoiceschanged = loadVoices;
            }
          }, []);

          useEffect(() => {
            if (mode === 'karuta') {
              initializeKaruta();
            }
          }, [mode, phrases]);

          const initializeKaruta = () => {
            setSelectedFrench(null);
            setSelectedJapanese(null);
            setMatchedPairs([]);
            setShuffledFrench([...phrases].sort(() => Math.random() - 0.5));
            setShuffledJapanese([...phrases].sort(() => Math.random() - 0.5));
          };

          const speak = (text, lang) => {
            return new Promise((resolve) => {
              if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                
                if (lang === 'fr' && selectedVoice) {
                  utterance.voice = selectedVoice;
                  utterance.lang = selectedVoice.lang;
                } else {
                  utterance.lang = lang === 'fr' ? 'fr-FR' : 'ja-JP';
                }
                
                utterance.rate = 0.85;
                
                utterance.onend = () => {
                  setIsSpeaking(false);
                  resolve();
                };
                
                utterance.onerror = () => {
                  setIsSpeaking(false);
                  resolve();
                };
                
                setIsSpeaking(true);
                window.speechSynthesis.speak(utterance);
              } else {
                resolve();
              }
            });
          };

          const playPhrase = async (phrase) => {
            await speak(phrase.french, 'fr');
          };

          const startListening = async () => {
            setIsPlaying(true);
            playingRef.current = true;
            let index = currentIndex;
            let count = 0;
            let phrasesPlayed = 0;

            const playLoop = async () => {
              if (!playingRef.current || phrasesPlayed >= maxPhrases) {
                stopListening();
                return;
              }
              
              await playPhrase(phrases[index]);
              count++;
              phrasesPlayed++;
              
              if (count >= repeatCount) {
                count = 0;
                index = (index + 1) % phrases.length;
                setCurrentIndex(index);
              }
              
              await new Promise(resolve => setTimeout(resolve, 1000));
              
              if (playingRef.current) {
                playLoop();
              }
            };

            playLoop();
          };

          const stopListening = () => {
            playingRef.current = false;
            setIsPlaying(false);
            window.speechSynthesis.cancel();
            setIsSpeaking(false);
          };

          const addPhrase = () => {
            if (newFrench.trim() && newJapanese.trim()) {
              const newPhrase = {
                id: Date.now(),
                french: newFrench.trim(),
                japanese: newJapanese.trim()
              };
              setPhrases([...phrases, newPhrase]);
              setNewFrench('');
              setNewJapanese('');
              setShowAddForm(false);
            }
          };

          const deletePhrase = (id) => {
            if (window.confirm('このフレーズを削除しますか？')) {
              setPhrases(phrases.filter(p => p.id !== id));
            }
          };

          const handleFrenchClick = (phrase) => {
            if (matchedPairs.includes(phrase.id)) return;
            
            playPhrase(phrase);
            
            setSelectedFrench(phrase);
            
            if (selectedJapanese && selectedJapanese.id === phrase.id) {
              setMatchedPairs([...matchedPairs, phrase.id]);
              setSelectedFrench(null);
              setSelectedJapanese(null);
            } else if (selectedJapanese) {
              setTimeout(() => {
                setSelectedFrench(null);
                setSelectedJapanese(null);
              }, 1000);
            }
          };

          const handleJapaneseClick = (phrase) => {
            if (matchedPairs.includes(phrase.id)) return;
            
            setSelectedJapanese(phrase);
            
            if (selectedFrench && selectedFrench.id === phrase.id) {
              setMatchedPairs([...matchedPairs, phrase.id]);
              setSelectedFrench(null);
              setSelectedJapanese(null);
            } else if (selectedFrench) {
              setTimeout(() => {
                setSelectedFrench(null);
                setSelectedJapanese(null);
              }, 1000);
            }
          };

          const PlayIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          );

          const PauseIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          );

          const PlusIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          );

          const Volume2Icon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
          );

          const RotateCcwIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <polyline points="1 4 1 10 7 10"></polyline>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
          );

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4 md:p-6">
              <div className="max-w-6xl mx-auto">
                <h1 className="text-4xl font-bold text-center mb-8 text-indigo-900">
                  フランス語フレーズ学習 🇫🇷
                </h1>

                <div className="flex gap-4 justify-center mb-8">
                  <button
                    onClick={() => {
                      stopListening();
                      setMode('listening');
                    }}
                    className={`px-6 py-3 rounded-lg font-semibold transition ${
                      mode === 'listening'
                        ? 'bg-indigo-600 text-white'
                        : 'bg-white text-indigo-600 hover:bg-indigo-50'
                    }`}
                  >
                    リスニングモード
                  </button>
                  <button
                    onClick={() => {
                      stopListening();
                      setMode('karuta');
                    }}
                    className={`px-6 py-3 rounded-lg font-semibold transition ${
                      mode === 'karuta'
                        ? 'bg-indigo-600 text-white'
                        : 'bg-white text-indigo-600 hover:bg-indigo-50'
                    }`}
                  >
                    カルタモード
                  </button>
                </div>

                {mode === 'listening' ? (
                  <div className="bg-white rounded-xl shadow-lg p-8">
                    <div className="mb-6">
                      <div className="flex items-center justify-between mb-4">
                        <h2 className="text-2xl font-semibold text-gray-800">フレーズリスト</h2>
                        <button
                          onClick={() => setShowAddForm(!showAddForm)}
                          className="flex items-center gap-2 px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition"
                        >
                          <PlusIcon />
                          フレーズ追加
                        </button>
                      </div>

                      {showAddForm && (
                        <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                          <input
                            type="text"
                            placeholder="フランス語"
                            value={newFrench}
                            onChange={(e) => setNewFrench(e.target.value)}
                            className="w-full px-4 py-2 mb-2 border border-gray-300 rounded-lg"
                          />
                          <textarea
                            placeholder="日本語（説明も含めて長文OK）"
                            value={newJapanese}
                            onChange={(e) => setNewJapanese(e.target.value)}
                            className="w-full px-4 py-2 mb-2 border border-gray-300 rounded-lg"
                            rows="3"
                          />
                          <button
                            onClick={addPhrase}
                            className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition"
                          >
                            追加
                          </button>
                        </div>
                      )}

                      <div className="space-y-2 max-h-96 overflow-y-auto">
                        {phrases.map((phrase, index) => (
                          <div
                            key={phrase.id}
                            className={`p-4 rounded-lg border-2 transition ${
                              index === currentIndex && isPlaying
                                ? 'border-indigo-600 bg-indigo-50'
                                : 'border-gray-200 bg-white'
                            }`}
                          >
                            <div className="flex items-center justify-between mb-2">
                              <button
                                onClick={() => playPhrase(phrase)}
                                disabled={isSpeaking}
                                className="p-2 text-indigo-600 hover:bg-indigo-100 rounded-lg transition disabled:opacity-50"
                              >
                                <Volume2Icon />
                              </button>
                            </div>
                            <div className="font-semibold text-lg text-gray-800 mb-1">{phrase.french}</div>
                            <div className="text-gray-600 text-sm">{phrase.japanese}</div>
                            <div className="flex justify-end mt-2">
                              <button
                                onClick={() => deletePhrase(phrase.id)}
                                className="text-xs text-red-600 hover:bg-red-50 px-3 py-1 rounded transition"
                              >
                                削除
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="mt-6 p-6 bg-indigo-50 rounded-lg">
                      {voiceWarning && (
                        <div className="mb-4 p-4 bg-yellow-100 border-2 border-yellow-500 rounded-lg">
                          <p className="text-sm text-yellow-800">{voiceWarning}</p>
                        </div>
                      )}

                      {availableVoices.length > 0 && (
                        <div className="mb-4">
                          <label className="block text-sm font-medium text-gray-700 mb-2">
                            フランス語音声: {selectedVoice?.name || '選択してください'}
                          </label>
                          <select
                            value={selectedVoice?.name || ''}
                            onChange={(e) => {
                              const voice = availableVoices.find(v => v.name === e.target.value);
                              setSelectedVoice(voice);
                            }}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white"
                          >
                            {availableVoices.map((voice) => (
                              <option key={voice.name} value={voice.name}>
                                {voice.name} ({voice.lang})
                              </option>
                            ))}
                          </select>
                        </div>
                      )}

                      <div className="mb-4">
                        <label className="block text-sm font-medium text-gray-700 mb-2">
                          繰り返し回数: {repeatCount}回
                        </label>
                        <input
                          type="range"
                          min="1"
                          max="10"
                          value={repeatCount}
                          onChange={(e) => setRepeatCount(Number(e.target.value))}
                          className="w-full"
                        />
                      </div>

                      <div className="mb-4">
                        <label className="block text-sm font-medium text-gray-700 mb-2">
                          最大フレーズ数: {maxPhrases}個
                        </label>
                        <div className="flex gap-2">
                          <button
                            onClick={() => setMaxPhrases(5)}
                            className={`px-4 py-2 rounded-lg transition ${
                              maxPhrases === 5
                                ? 'bg-indigo-600 text-white'
                                : 'bg-white text-indigo-600 border border-indigo-600 hover:bg-indigo-50'
                            }`}
                          >
                            5個
                          </button>
                          <button
                            onClick={() => setMaxPhrases(10)}
                            className={`px-4 py-2 rounded-lg transition ${
                              maxPhrases === 10
                                ? 'bg-indigo-600 text-white'
                                : 'bg-white text-indigo-600 border border-indigo-600 hover:bg-indigo-50'
                            }`}
                          >
                            10個
                          </button>
                          <button
                            onClick={() => setMaxPhrases(15)}
                            className={`px-4 py-2 rounded-lg transition ${
                              maxPhrases === 15
                                ? 'bg-indigo-600 text-white'
                                : 'bg-white text-indigo-600 border border-indigo-600 hover:bg-indigo-50'
                            }`}
                          >
                            15個
                          </button>
                        </div>
                      </div>

                      <div className="flex gap-4 justify-center">
                        {!isPlaying ? (
                          <button
                            onClick={startListening}
                            className="flex items-center gap-2 px-8 py-4 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition text-lg font-semibold"
                          >
                            <PlayIcon />
                            再生開始
                          </button>
                        ) : (
                          <button
                            onClick={stopListening}
                            className="flex items-center gap-2 px-8 py-4 bg-red-600 text-white rounded-lg hover:bg-red-700 transition text-lg font-semibold"
                          >
                            <PauseIcon />
                            停止
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="bg-white rounded-xl shadow-lg p-8">
                    <div className="flex items-center justify-between mb-6">
                      <h2 className="text-2xl font-semibold text-gray-800">
                        カルタゲーム - マッチしたペア: {matchedPairs.length}/{phrases.length}
                      </h2>
                      <button
                        onClick={initializeKaruta}
                        className="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition"
                      >
                        <RotateCcwIcon />
                        リセット
                      </button>
                    </div>

                    {matchedPairs.length === phrases.length && (
                      <div className="mb-6 p-4 bg-green-100 border-2 border-green-500 rounded-lg text-center">
                        <p className="text-2xl font-bold text-green-700">🎉 おめでとうございます！全部クリア！</p>
                      </div>
                    )}

                    <div className="grid md:grid-cols-2 gap-8">
                      <div>
                        <h3 className="text-xl font-semibold mb-4 text-indigo-700">フランス語</h3>
                        <div className="space-y-2">
                          {shuffledFrench.map((phrase) => (
                            <button
                              key={phrase.id}
                              onClick={() => handleFrenchClick(phrase)}
                              disabled={matchedPairs.includes(phrase.id)}
                              className={`w-full p-4 rounded-lg text-left transition border-2 ${
                                matchedPairs.includes(phrase.id)
                                  ? 'bg-green-100 border-green-500 opacity-50 cursor-not-allowed'
                                  : selectedFrench?.id === phrase.id
                                  ? 'bg-indigo-200 border-indigo-600'
                                  : 'bg-white border-gray-300 hover:border-indigo-400 hover:bg-indigo-50'
                              }`}
                            >
                              <div className="font-semibold text-base">{phrase.french}</div>
                            </button>
                          ))}
                        </div>
                      </div>

                      <div>
                        <h3 className="text-xl font-semibold mb-4 text-pink-700">日本語</h3>
                        <div className="space-y-2">
                          {shuffledJapanese.map((phrase) => (
                            <button
                              key={phrase.id}
                              onClick={() => handleJapaneseClick(phrase)}
                              disabled={matchedPairs.includes(phrase.id)}
                              className={`w-full p-4 rounded-lg text-left transition border-2 ${
                                matchedPairs.includes(phrase.id)
                                  ? 'bg-green-100 border-green-500 opacity-50 cursor-not-allowed'
                                  : selectedJapanese?.id === phrase.id
                                  ? 'bg-pink-200 border-pink-600'
                                  : 'bg-white border-gray-300 hover:border-pink-400 hover:bg-pink-50'
                              }`}
                            >
                              <div className="font-semibold text-sm">{phrase.japanese.split('。')[0]}。</div>
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        };

        ReactDOM.render(<FrenchPhrasesApp />, document.getElementById('root'));
    </script>
</body>
</html>

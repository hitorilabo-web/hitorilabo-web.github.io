  const $=sel=>document.querySelector(sel);

        answers.push(item.k);
        i++;
        if(i<total){
          render();
          window.scrollTo({top:document.getElementById('tt-quiz').offsetTop-10,behavior:'smooth'});
        } else {
          finish();
        }
      };
      opts.appendChild(d);
    });
  }

  // === 判定 ===
  function finish(){
    const max=Math.max(score.A,score.B,score.C,score.D);
    const tied=Object.keys(score).filter(function(k){return score[k]===max;}).sort();
    let destKey;

    if(tied.length===1){
      destKey=tied[0];
    } else if(tied.length===2){
      destKey=(tied[0]+tied[1]).toUpperCase();
    } else {
      const priority=[0,1,2];
      let chosen=null;
      for(let idx=0;idx<priority.length;idx++){
        if(answers[priority[idx]] && tied.indexOf(answers[priority[idx]])!==-1){
          chosen=answers[priority[idx]];
          break;
        }
      }
      if(!chosen) chosen=tied[0];
      const others=tied.filter(function(k){return k!==chosen;}).sort();
      destKey=(chosen+others[0]).toUpperCase();
    }

    const result=RESULTS[destKey]||RESULTS.A;
    showResult(result);
  }

  // === 結果表示 ===
  function showResult(r){
    const quiz=$('#tt-quiz');
    const nl2br=function(s){return s.replace(/\n/g,'<br>');};

    quiz.style.background='transparent';
    quiz.style.padding='0';
    quiz.innerHTML=
      '<div class="result-area">'+
        '<div class="result-eyecatch"><img src="'+r.img+'" alt="結果"></div>'+
        '<div class="result-subtitle">'+nl2br(r.subtitle)+'</div>'+
        '<div class="result-body">'+
          nl2br(r.body)+
        '</div>'+
        '<hr class="result-separator">'+
        '<div class="result-question-heading">あなたへの問い</div>'+
        '<div class="result-question">'+nl2br(r.question)+'</div>'+
        '<hr class="result-separator">'+
        '<div class="result-links">'+
          '<a href="check2.html" class="result-link-btn">思考モード診断へ</a><br>'+
          '<button class="retry-btn" onclick="location.reload()">もう一度診断する</button>'+
        '</div>'+
      '</div>';

    // 結果位置までスクロール
    window.scrollTo({top:quiz.offsetTop-20,behavior:'smooth'});

    // クレジット非表示
    var credit=document.querySelector('.quiz-credit');
    if(credit) credit.style.display='none';
  }

  document.addEventListener('DOMContentLoaded',render);
})();
</script>
